<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAR Generator - Test</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const HEADER_IMG = "./header.png";
    const FOOTER_IMG = "./footer.png";

    const SYSTEM_PROMPT = `You are an assistant helping fill out an Accomplishment Activity Report (AAR) for DICT (Department of Information and Communications Technology) Philippines.

    Your job is to collect information through a friendly conversation, ONE question at a time. Ask the next question only after getting an answer.
    
    Collect these fields in order:
    1. Activity title
    2. Date and time (e.g. "December 2-3, 2025 | 9:00am - 5:00pm")
    3. Mode/Platform/Location (e.g. "Face-to-Face" or "Online via Zoom")
    4. Control number (e.g. "eLGU-R2-12-04-2025-S157")
    5. DICT Facilitators - ask for each: Name, Office, Gender (M/F). Ask how many facilitators first, then collect each one.
    6. Beneficiary breakdown: how many Male/Female from NGAs, LGUs, SUCs, Others
    7. What was the activity about? (for Rationale - you will write the formal rationale based on their answer)
    8. Key topics/modules discussed and outcomes (for Highlights - you will write the formal highlights based on their answer)
    9. Name and position of the person who prepared the report
    10. Name and position of the person who will conform/approve the report
    
    After collecting ALL fields, output ONLY a valid JSON object (no markdown, no explanation) in this exact format:
    {
      "title": "",
      "dateTime": "",
      "mode": "",
      "controlNo": "",
      "facilitators": [{"name": "", "office": "", "gender": ""}],
      "beneficiaries": {"ngas": {"male": 0, "female": 0}, "lgus": {"male": 0, "female": 0}, "sucs": {"male": 0, "female": 0}, "others": {"male": 0, "female": 0}},
      "rationale": "",
      "highlights": "",
      "preparedBy": {"name": "", "position": ""},
      "conformedBy": {"name": "", "position": ""}
    }
    
    Important:
    - Write rationale and highlights in formal, professional government report style (2-3 paragraphs each)
    - Only output the JSON when ALL fields are collected
    - Keep conversation friendly and clear
    - If user says "done" or "that's all" when adding facilitators or asking for more, accept it`;

    const INITIAL_MESSAGE = {
      role: "assistant",
      content: "Hello! I'll help you create your Accomplishment Activity Report. Let's start — what is the **title of the activity**?"
    };

    function ReportPreview({ data, photos, onUpdate, headerImg, footerImg }) {
      const [editField, setEditField] = useState(null);
      const [editValue, setEditValue] = useState("");
      const [editDeep, setEditDeep] = useState(null);
      
      const facilitatorMale = data.facilitators.filter(f => f.gender?.toUpperCase() === "M").length;
      const facilitatorFemale = data.facilitators.filter(f => f.gender?.toUpperCase() === "F").length;

      const b = data.beneficiaries;
      const benMale = (b.ngas?.male||0)+(b.lgus?.male||0)+(b.sucs?.male||0)+(b.others?.male||0);
      const benFemale = (b.ngas?.female||0)+(b.lgus?.female||0)+(b.sucs?.female||0)+(b.others?.female||0);
      const totalMale = facilitatorMale + benMale;
      const totalFemale = facilitatorFemale + benFemale;

      const startEdit = (field, value, deep = null) => {
        setEditField(field);
        setEditValue(value || "");
        setEditDeep(deep);
      };

      const saveEdit = () => {
        if (editDeep) {
          onUpdate(editDeep, editValue);
        } else {
          onUpdate(editField, editValue);
        }
        setEditField(null);
        setEditValue("");
        setEditDeep(null);
      };

      const renderEditable = (field, value, deep = null) => {
        if (editField === field && editDeep === deep) {
          return (
            <input
              autoFocus
              value={editValue}
              onChange={e => setEditValue(e.target.value)}
              onBlur={saveEdit}
              onKeyDown={e => e.key === "Enter" && saveEdit()}
              style={{padding:"4px", width:"100%", border:"2px solid #0033cc", borderRadius:"4px"}}
            />
          );
        }
        return <span onClick={() => startEdit(field, value, deep)} style={{cursor:"pointer", background:editField===field?"#ffffcc":(onUpdate?"#f8f8f8":""), padding:"2px 4px", borderRadius:"3px"}}>{value}</span>;
      };

      return (
        <div id="report-preview" style={{fontFamily:"'Times New Roman', serif", fontSize:"11pt", color:"#000", background:"#fff", padding:"40px 48px", maxWidth:"800px", margin:"0 auto"}}>
          <div style={{marginBottom:"16px"}}>
            {headerImg ? (
              <img src={headerImg} alt="header" style={{width:"100%"}}/>
            ) : (
              <div style={{height:"80px", border:"2px dashed #ccc", display:"flex", alignItems:"center", justifyContent:"center", color:"#999"}}>
                No header image uploaded
              </div>
            )}
          </div>

          <table style={{width:"100%", borderCollapse:"collapse", marginBottom:"20px", border:"2px solid #0000cc"}}>
            <tbody>
              <tr>
                <td style={{background:"#0000cc", color:"#fff", fontWeight:"bold", padding:"6px 10px", width:"30%"}}>Title</td>
                <td style={{padding:"6px 10px", border:"1px solid #0000cc"}} colSpan="3">{renderEditable("title", data.title)}</td>
              </tr>
              <tr>
                <td style={{background:"#0000cc", color:"#fff", fontWeight:"bold", padding:"6px 10px"}}>Date and Time</td>
                <td style={{padding:"6px 10px", border:"1px solid #0000cc", fontWeight:"bold"}} colSpan="3">{renderEditable("dateTime", data.dateTime)}</td>
              </tr>
              <tr>
                <td style={{background:"#0000cc", color:"#fff", fontWeight:"bold", padding:"6px 10px"}}>Mode/Platform/Location</td>
                <td style={{padding:"6px 10px", border:"1px solid #0000cc"}}>{renderEditable("mode", data.mode)}</td>
                <td style={{background:"#0000cc", color:"#fff", fontWeight:"bold", padding:"6px 10px"}}>Control No.</td>
                <td style={{padding:"6px 10px", border:"1px solid #0000cc"}}>{renderEditable("controlNo", data.controlNo)}</td>
              </tr>
              <tr>
                <td style={{background:"#0000cc", color:"#fff", fontWeight:"bold", padding:"6px 10px"}}>Participants</td>
                <td style={{padding:"6px 10px", border:"1px solid #0000cc", color:"#0000cc", textDecoration:"underline"}} colSpan="3">Attached Attendance</td>
              </tr>
            </tbody>
          </table>

          <div style={{marginBottom:"20px"}}>
            <div style={{fontWeight:"bold", marginBottom:"8px"}}>I.&nbsp;&nbsp;&nbsp;RATIONALE</div>
            {data.rationale.split("\n").filter(p=>p.trim()).map((p,i) => (
              <p key={i} style={{textAlign:"justify", textIndent:"36px", marginBottom:"8px", lineHeight:"1.8"}}>{renderEditable("rationale", p)}</p>
            ))}
          </div>

          <div style={{marginBottom:"20px"}}>
            <div style={{fontWeight:"bold", marginBottom:"8px"}}>II.&nbsp;&nbsp;ATTENDEES</div>
            <div style={{fontWeight:"bold", fontStyle:"italic", marginBottom:"6px", paddingLeft:"24px"}}>A. Facilitator (DICT)</div>
            <table style={{width:"100%", borderCollapse:"collapse", marginBottom:"8px"}}>
              <thead>
                <tr>
                  {["Name","Office","Gender"].map(h => (
                    <th key={h} style={{background:"#0000cc", color:"#fff", padding:"6px 10px", border:"1px solid #0000cc"}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {data.facilitators.map((f,i) => (
                  <tr key={i}>
                    <td style={{padding:"5px 10px", border:"1px solid #ccc"}}>{f.name}</td>
                    <td style={{padding:"5px 10px", border:"1px solid #ccc"}}>{f.office}</td>
                    <td style={{padding:"5px 10px", border:"1px solid #ccc", textAlign:"center"}}>{f.gender}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <div style={{textAlign:"right", fontWeight:"bold", marginBottom:"16px"}}>Male: {facilitatorMale} | Female: {facilitatorFemale}</div>

            <div style={{fontWeight:"bold", fontStyle:"italic", marginBottom:"6px", paddingLeft:"24px"}}>B. NGAs / LGUs / SUCs and other Beneficiaries <span style={{fontStyle:"italic", fontWeight:"normal"}}>(please see attached attendance sheet)</span></div>
            <table style={{width:"100%", borderCollapse:"collapse", marginBottom:"8px"}}>
              <thead>
                <tr>
                  <th colSpan="2" style={{background:"#0000cc", color:"#fff", padding:"6px", border:"1px solid #0000cc"}}>NGAs</th>
                  <th colSpan="2" style={{background:"#0000cc", color:"#fff", padding:"6px", border:"1px solid #0000cc"}}>LGUs</th>
                  <th colSpan="2" style={{background:"#0000cc", color:"#fff", padding:"6px", border:"1px solid #0000cc"}}>SUCs</th>
                  <th colSpan="2" style={{background:"#0000cc", color:"#fff", padding:"6px", border:"1px solid #0000cc"}}>Others</th>
                </tr>
                <tr>
                  {["Male","Female","Male","Female","Male","Female","Male","Female"].map((g,i) => (
                    <th key={i} style={{background:"#eef", padding:"5px 6px", border:"1px solid #ccc", fontWeight:"normal"}}>{g}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                <tr>
                  {[b.ngas?.male,b.ngas?.female,b.lgus?.male,b.lgus?.female,b.sucs?.male,b.sucs?.female,b.others?.male,b.others?.female].map((v,i) => (
                    <td key={i} style={{padding:"5px 6px", border:"1px solid #ccc", textAlign:"center"}}>{v||""}</td>
                  ))}
                </tr>
              </tbody>
            </table>
            <div style={{textAlign:"right", fontWeight:"bold", marginBottom:"16px"}}>Male: {benMale} | Female: {benFemale}</div>

            <div style={{fontWeight:"bold", fontStyle:"italic", marginBottom:"6px", paddingLeft:"24px"}}>C. Consolidated participants</div>
            <table style={{width:"60%", borderCollapse:"collapse"}}>
              <tbody>
                <tr><td style={{padding:"5px 10px", border:"1px solid #ccc"}}>Total number of male attendees</td><td style={{padding:"5px 20px", border:"1px solid #ccc", textAlign:"center"}}>{totalMale}</td></tr>
                <tr><td style={{padding:"5px 10px", border:"1px solid #ccc"}}>Total number of female attendees</td><td style={{padding:"5px 20px", border:"1px solid #ccc", textAlign:"center"}}>{totalFemale}</td></tr>
                <tr><td style={{padding:"6px 10px", border:"1px solid #0000cc", background:"#0000cc", color:"#fff", fontWeight:"bold"}}>Total number of attendees</td><td style={{padding:"6px 20px", border:"1px solid #0000cc", background:"#0000cc", color:"#fff", fontWeight:"bold", textAlign:"center"}}>{totalMale+totalFemale}</td></tr>
              </tbody>
            </table>
          </div>

          <div style={{marginBottom:"20px"}}>
            <div style={{fontWeight:"bold", marginBottom:"8px"}}>III.&nbsp;HIGHLIGHTS OF DISCUSSION</div>
            {data.highlights.split("\n").filter(p=>p.trim()).map((p,i) => (
              <p key={i} style={{textAlign:"justify", textIndent:"36px", marginBottom:"8px", lineHeight:"1.8", paddingLeft:"24px"}}>{renderEditable("highlights", p)}</p>
            ))}
            <div style={{textAlign:"center", fontStyle:"italic", marginTop:"12px", fontSize:"9pt"}}>
              [{data.title} on {data.dateTime?.split("|")[0]?.trim()}]
            </div>
          </div>

          <div style={{marginBottom:"20px"}}>
            <div style={{fontWeight:"bold", marginBottom:"8px"}}>IV.&nbsp;&nbsp;ANNEXES</div>
            <div style={{fontWeight:"bold", fontStyle:"italic", marginBottom:"12px", paddingLeft:"24px"}}>A. PHOTOS <span style={{fontStyle:"italic", fontWeight:"normal"}}>(must be action picture)</span></div>
            {photos.length > 0 ? (
              <div>
                <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"4px", border:"2px solid #0000cc", padding:"4px"}}>
                  {photos.slice(0,4).map((p,i) => (
                    <img key={i} src={p} alt={`Photo ${i+1}`} style={{width:"100%", aspectRatio:"4/3", objectFit:"cover"}}/>
                  ))}
                </div>
                {photos.length > 4 && (
                  <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"4px", border:"2px solid #0000cc", padding:"4px", marginTop:"4px"}}>
                    {photos.slice(4,8).map((p,i) => (
                      <img key={i+4} src={p} alt={`Photo ${i+5}`} style={{width:"100%", aspectRatio:"4/3", objectFit:"cover"}}/>
                    ))}
                  </div>
                )}
              </div>
            ) : (
              <div style={{border:"2px dashed #aaa", padding:"40px", textAlign:"center", color:"#999", margin:"0 0 16px 24px"}}>Upload photos using the button above</div>
            )}
          </div>

          <table style={{width:"100%", borderCollapse:"collapse", border:"1px solid #ccc"}}>
            <tbody>
              <tr>
                <td style={{padding:"12px 16px", border:"1px solid #ccc", width:"50%", verticalAlign:"top"}}>
                  <div style={{fontWeight:"bold", marginBottom:"40px"}}>Prepared by:</div>
                  <div style={{fontWeight:"bold"}}>{renderEditable("preparedBy.name", data.preparedBy?.name, "preparedBy.name")}</div>
                  <div>{renderEditable("preparedBy.position", data.preparedBy?.position, "preparedBy.position")}</div>
                </td>
                <td style={{padding:"12px 16px", border:"1px solid #ccc", verticalAlign:"top"}}>
                  <div style={{fontWeight:"bold", marginBottom:"40px"}}>Conformed by:</div>
                  <div style={{fontWeight:"bold"}}>{renderEditable("conformedBy.name", data.conformedBy?.name, "conformedBy.name")}</div>
                  <div>{renderEditable("conformedBy.position", data.conformedBy?.position, "conformedBy.position")}</div>
                </td>
              </tr>
            </tbody>
          </table>
          <div style={{marginTop:"8px", fontStyle:"italic", color:"#0000cc", fontSize:"10pt"}}>Copy furnish: eLGU Project Management Team</div>

          <div style={{marginTop:"20px", overflow:"hidden"}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", fontSize:"9pt", marginBottom:"6px"}}>
              <div style={{fontStyle:"italic"}}>[{data.title} on {data.dateTime?.split("|")[0]?.trim()}]</div>
              <div className="page-number-display" style={{fontWeight:"bold", color:"#0000cc"}}>PAGE 1 OF 1</div>
            </div>
            {footerImg ? (
              <img src={footerImg} alt="footer" style={{width:"100%", display:"block", marginTop:"4px"}}/>
            ) : (
              <div style={{height:"60px", border:"2px dashed #ccc", display:"flex", alignItems:"center", justifyContent:"center", color:"#999", marginTop:"4px"}}>
                No footer image uploaded
              </div>
            )}
          </div>
        </div>
      );
    }

    function AARApp() {
      const [tab, setTab] = useState("chat");
      const [messages, setMessages] = useState([INITIAL_MESSAGE]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [reportData, setReportData] = useState(null);
      const [photos, setPhotos] = useState([]);
      const [headerImgData, setHeaderImgData] = useState(HEADER_IMG);
      const [footerImgData, setFooterImgData] = useState(FOOTER_IMG);
      const chatRef = useRef(null);
      const fileRef = useRef(null);
      const headerRef = useRef(null);
      const footerRef = useRef(null);

      useEffect(() => {
        if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
      }, [messages]);

      const handleHeaderUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = ev => setHeaderImgData(ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      const handleFooterUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = ev => setFooterImgData(ev.target.result);
          reader.readAsDataURL(file);
        }
      };

      const sendMessage = async () => {
        if (!input.trim() || loading) return;
        const userMsg = { role: "user", content: input.trim() };
        const newMessages = [...messages, userMsg];
        setMessages(newMessages);
        setInput("");
        setLoading(true);

        try {
          const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer YOUR_GROQ_API_KEY"
            },
            body: JSON.stringify({
              model: "llama-3.3-70b-versatile",
              max_tokens: 4000,
              messages: [
                { role: "system", content: SYSTEM_PROMPT },
                ...newMessages.map(m => ({ role: m.role, content: m.content }))
              ]
            })
          });
          
          if (!res.ok) {
            const errData = await res.json();
            throw new Error("API Error: " + JSON.stringify(errData));
          }
          
          const data = await res.json();
          const text = data.choices?.[0]?.message?.content || "No response";

          const jsonMatch = text.match(/\{[\s\S]*\}/);
          if (jsonMatch) {
            try {
              const parsed = JSON.parse(jsonMatch[0]);
              setReportData(parsed);
              setMessages(prev => [...prev, {
                role: "assistant",
                content: "✅ **Report data collected!** Click the **Preview Report** tab to see your formatted AAR. Don't forget to upload photos!"
              }]);
              setTab("preview");
            } catch {
              setMessages(prev => [...prev, { role: "assistant", content: text }]);
            }
          } else {
            setMessages(prev => [...prev, { role: "assistant", content: text }]);
          }
        } catch (e) {
          console.error("API Error:", e);
          setMessages(prev => [...prev, { role: "assistant", content: "❌ Error: " + e.message }]);
        }
        setLoading(false);
      };

      const handlePhotos = (e) => {
        const files = Array.from(e.target.files);
        files.forEach(f => {
          const reader = new FileReader();
          reader.onload = (ev) => setPhotos(prev => [...prev, ev.target.result]);
          reader.readAsDataURL(f);
        });
      };

      const escapeHtml = (value) => String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

      const renderPdfParagraphs = (value) => {
        const paragraphs = String(value || "")
          .split(/\n+/)
          .map(p => p.trim())
          .filter(Boolean);

        return paragraphs.length
          ? paragraphs.map(p => `<p>${escapeHtml(p)}</p>`).join("")
          : `<p></p>`;
      };

      const buildPdfDocument = () => {
        const data = reportData;
        const b = data.beneficiaries || {};
        const facilitatorMale = data.facilitators.filter(f => f.gender?.toUpperCase() === "M").length;
        const facilitatorFemale = data.facilitators.filter(f => f.gender?.toUpperCase() === "F").length;
        const benMale = (b.ngas?.male||0)+(b.lgus?.male||0)+(b.sucs?.male||0)+(b.others?.male||0);
        const benFemale = (b.ngas?.female||0)+(b.lgus?.female||0)+(b.sucs?.female||0)+(b.others?.female||0);
        const totalMale = facilitatorMale + benMale;
        const totalFemale = facilitatorFemale + benFemale;
        const activityDate = data.dateTime?.split("|")[0]?.trim() || "";
        const footerLabel = `[${escapeHtml(data.title)} on ${escapeHtml(activityDate)}]`;
        const img = src => src ? escapeHtml(src) : "";
        const cell = value => escapeHtml(value || "");
        const num = value => Number(value || 0);

        const pageFooter = page => `
          <div class="pdf-footer">
            <div class="pdf-footer-meta">
              <div class="pdf-ref">${footerLabel}</div>
              <div class="pdf-page-no">PAGE ${page} OF 3</div>
            </div>
            ${footerImgData ? `<img class="pdf-footer-img" src="${img(footerImgData)}" alt="footer">` : ""}
          </div>
        `;

        const facilitatorRows = data.facilitators.map(f => `
          <tr>
            <td>${cell(f.name)}</td>
            <td>${cell(f.office)}</td>
            <td class="center">${cell(f.gender)}</td>
          </tr>
        `).join("");

        const photoCells = [...Array(4)].map((_, i) => {
          const src = photos[i];
          return src
            ? `<div class="photo-slot"><img src="${img(src)}" alt="Photo ${i + 1}"></div>`
            : `<div class="photo-slot empty"></div>`;
        }).join("");

        return `
          <section class="pdf-page page-one">
            <div class="top-pattern"></div>
            <main class="pdf-content">
              ${headerImgData ? `<img class="pdf-header-img" src="${img(headerImgData)}" alt="header">` : ""}
              <table class="info-table">
                <tbody>
                  <tr><th>Title</th><td colspan="3">${cell(data.title)}</td></tr>
                  <tr><th>Date and Time</th><td colspan="3"><strong>${cell(data.dateTime)}</strong></td></tr>
                  <tr><th>Mode/Platform/Location</th><td>${cell(data.mode)}</td><th>Control No.</th><td>${cell(data.controlNo)}</td></tr>
                  <tr><th>Participants</th><td colspan="3" class="linkish">Attached Attendance</td></tr>
                </tbody>
              </table>

              <h2>I. <span>RATIONALE</span></h2>
              <div class="body-text">${renderPdfParagraphs(data.rationale)}</div>

              <h2>II. <span>ATTENDEES</span></h2>
              <h3>A. Facilitator (DICT)</h3>
              <table class="blue-table facilitator-table">
                <thead><tr><th>Name</th><th>Office</th><th>Gender</th></tr></thead>
                <tbody>${facilitatorRows}</tbody>
              </table>
              <div class="totals-line">Male: ${facilitatorMale} | Female: ${facilitatorFemale}</div>
            </main>
            ${pageFooter(1)}
          </section>

          <section class="pdf-page">
            <main class="pdf-content continuation">
              <h3>B. NGAs / LGUs / SUCs and other Beneficiaries <em>(please see attached attendance sheet)</em></h3>
              <table class="blue-table beneficiary-table">
                <thead>
                  <tr><th colspan="2">NGAs</th><th colspan="2">LGUs</th><th colspan="2">SUCs</th><th colspan="2">Others</th></tr>
                  <tr class="subhead"><td>Male</td><td>Female</td><td>Male</td><td>Female</td><td>Male</td><td>Female</td><td>Male</td><td>Female</td></tr>
                </thead>
                <tbody>
                  <tr>
                    <td>${num(b.ngas?.male) || ""}</td><td>${num(b.ngas?.female) || ""}</td>
                    <td>${num(b.lgus?.male) || ""}</td><td>${num(b.lgus?.female) || ""}</td>
                    <td>${num(b.sucs?.male) || ""}</td><td>${num(b.sucs?.female) || ""}</td>
                    <td>${num(b.others?.male) || ""}</td><td>${num(b.others?.female) || ""}</td>
                  </tr>
                </tbody>
              </table>
              <div class="totals-line">Male: ${benMale} | Female: ${benFemale}</div>

              <h3>C. Consolidated participants</h3>
              <table class="summary-table">
                <tbody>
                  <tr><td>Total number of male attendees</td><td>${totalMale}</td></tr>
                  <tr><td>Total number of female attendees</td><td>${totalFemale}</td></tr>
                  <tr class="summary-total"><td>Total number of attendees</td><td>${totalMale + totalFemale}</td></tr>
                </tbody>
              </table>

              <h2>III. <span>HIGHLIGHTS OF DISCUSSION</span></h2>
              <div class="body-text">${renderPdfParagraphs(data.highlights)}</div>
            </main>
            ${pageFooter(2)}
          </section>

          <section class="pdf-page">
            <main class="pdf-content continuation">
              <h2>IV. <span>ANNEXES</span></h2>
              <h3>A. PHOTOS <em>(must be action picture)</em></h3>
              <div class="photo-grid">${photoCells}</div>

              <table class="signature-table">
                <tbody>
                  <tr>
                    <td>
                      <strong>Prepared by:</strong>
                      <div class="signature-name">${cell(data.preparedBy?.name)}</div>
                      <div>${cell(data.preparedBy?.position)}</div>
                    </td>
                    <td>
                      <strong>Conformed by:</strong>
                      <div class="signature-name">${cell(data.conformedBy?.name)}</div>
                      <div>${cell(data.conformedBy?.position)}</div>
                    </td>
                  </tr>
                </tbody>
              </table>
              <div class="copy-furnish">Copy furnish: eLGU Project Management Team</div>
            </main>
            ${pageFooter(3)}
          </section>
        `;
      };

      const handlePrint = () => {
        if (!reportData) return;

        const w = window.open("", "_blank");
        if (!w) return;

        const baseHref = document.baseURI;
        w.document.write(`<!DOCTYPE html><html><head><title>AAR Report</title>
        <base href="${baseHref}">
        <style>
          * { box-sizing: border-box; }
          @page {
            size: A4;
            margin: 0;
          }
          html,
          body {
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', serif;
            font-size: 11pt;
            color: #000;
            background: #fff;
          }
          .pdf-page {
            position: relative;
            width: 210mm;
            height: 297mm;
            overflow: hidden;
            background: #fff;
            page-break-after: always;
            break-after: page;
          }
          .pdf-page:last-child {
            page-break-after: auto;
            break-after: auto;
          }
          .top-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 7mm;
            background-image: url("${FOOTER_IMG}");
            background-size: 210mm auto;
            background-position: left bottom;
            background-repeat: no-repeat;
          }
          .pdf-content {
            position: relative;
            z-index: 1;
            padding: 14mm 19mm 34mm;
          }
          .page-one .pdf-content {
            padding-top: 13mm;
          }
          .continuation {
            padding-top: 24mm;
          }
          .pdf-header-img {
            display: block;
            width: 100%;
            margin: 0 auto 9mm;
          }
          table {
            border-collapse: collapse;
            width: 100%;
          }
          .info-table {
            margin-bottom: 11mm;
            border: 1.5px solid #0000cc;
            font-size: 10pt;
          }
          .info-table th {
            width: 31%;
            text-align: left;
            background: #0000cc;
            color: #fff;
            padding: 3px 7px;
            border: 1px solid #0000cc;
            font-weight: 700;
          }
          .info-table td {
            padding: 3px 7px;
            border: 1px solid #0000cc;
            vertical-align: middle;
          }
          .info-table .linkish {
            color: #0000cc;
            text-decoration: underline;
          }
          h2 {
            margin: 0 0 6mm;
            font-size: 11pt;
            font-weight: 700;
          }
          h2 span {
            margin-left: 8mm;
          }
          h3 {
            margin: 0 0 4mm 13mm;
            font-size: 10.5pt;
            font-style: italic;
            font-weight: 700;
          }
          h3 em {
            font-weight: 400;
          }
          .body-text {
            margin: 0 0 12mm 0;
            font-size: 10.5pt;
            line-height: 1.85;
            text-align: justify;
          }
          .body-text p {
            margin: 0 0 4mm;
            text-indent: 11mm;
          }
          .blue-table {
            margin: 0 0 2mm 18mm;
            width: calc(100% - 18mm);
            font-size: 10pt;
          }
          .blue-table th {
            background: #0000cc;
            color: #fff;
            border: 1px solid #0000cc;
            padding: 3px 6px;
            text-align: center;
          }
          .blue-table td {
            border: 1px solid #0000cc;
            padding: 3px 6px;
          }
          .center,
          .beneficiary-table td {
            text-align: center;
          }
          .beneficiary-table .subhead td {
            font-weight: 400;
          }
          .totals-line {
            text-align: right;
            font-weight: 700;
            margin: 0 0 13mm;
            font-size: 10pt;
          }
          .summary-table {
            margin: 0 0 15mm 18mm;
            width: calc(100% - 18mm);
            font-size: 10pt;
          }
          .summary-table td {
            border: 1px solid #0000cc;
            padding: 3px 6px;
          }
          .summary-table td:last-child {
            width: 34%;
            text-align: center;
          }
          .summary-total td {
            background: #0000cc;
            color: #fff;
            font-weight: 700;
            text-align: center;
          }
          .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1mm;
            border: 1.5px solid #0000cc;
            padding: 1mm;
            margin: 12mm 0 14mm;
          }
          .photo-slot {
            height: 55mm;
            overflow: hidden;
            background: #f5f5f5;
          }
          .photo-slot img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
          }
          .signature-table {
            border: 1px solid #0000cc;
            font-size: 10pt;
          }
          .signature-table td {
            width: 50%;
            height: 32mm;
            border: 1px solid #0000cc;
            padding: 5mm 7mm 3mm;
            vertical-align: top;
          }
          .signature-name {
            margin-top: 14mm;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
          }
          .signature-name + div {
            text-align: center;
            text-transform: uppercase;
            font-size: 9.5pt;
          }
          .copy-furnish {
            margin-top: 4mm;
            color: #0000cc;
            font-style: italic;
            font-size: 10pt;
          }
          .pdf-footer {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 22mm;
          }
          .pdf-footer-meta {
            position: absolute;
            left: 19mm;
            right: 19mm;
            bottom: 10mm;
            min-height: 7mm;
            font-size: 8.5pt;
            color: #0000cc;
          }
          .pdf-ref {
            position: absolute;
            left: 0;
            bottom: 3mm;
            max-width: 112mm;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-style: italic;
            font-weight: 700;
          }
          .pdf-page-no {
            position: absolute;
            left: 50%;
            bottom: 0;
            transform: translateX(-50%);
            color: #000;
            font-size: 8pt;
          }
          .pdf-footer-img {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            display: block;
          }
          @media print {
            body {
              -webkit-print-color-adjust: exact !important;
              print-color-adjust: exact !important;
            }
            img {
              max-width: 100% !important;
            }
          }
        </style>
        </head><body>
        ${buildPdfDocument()}
        </body></html>`);
        w.document.close();

        const printWhenImagesLoad = () => {
          w.focus();
          w.print();
        };

        const images = Array.from(w.document.images);
        if (!images.length) {
          setTimeout(printWhenImagesLoad, 250);
          return;
        }

        let loaded = 0;
        const markLoaded = () => {
          loaded += 1;
          if (loaded === images.length) {
            setTimeout(printWhenImagesLoad, 250);
          }
        };
        images.forEach(img => {
          if (img.complete) {
            markLoaded();
          } else {
            img.onload = markLoaded;
            img.onerror = markLoaded;
          }
        });
      };

      const updateReportData = (field, value) => {
        setReportData(prev => {
          if (field.includes('.')) {
            const [parent, child] = field.split('.');
            return { ...prev, [parent]: { ...prev[parent], [child]: value } };
          }
          return { ...prev, [field]: value };
        });
      };

      const renderMessage = (msg, i) => {
        const isUser = msg.role === "user";
        return (
          <div key={i} style={{
            display:"flex", justifyContent: isUser ? "flex-end" : "flex-start",
            marginBottom:"12px"
          }}>
            {!isUser && (
              <div style={{width:"32px", height:"32px", borderRadius:"50%", background:"linear-gradient(135deg,#0033cc,#0099ff)", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:"11px", fontWeight:"bold", flexShrink:0, marginRight:"8px", marginTop:"4px"}}>AI</div>
            )}
            <div style={{
              maxWidth:"72%", padding:"10px 14px", borderRadius: isUser ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
              background: isUser ? "linear-gradient(135deg,#0033cc,#0055ff)" : "#f0f4ff",
              color: isUser ? "#fff" : "#1a1a2e",
              fontSize:"14px", lineHeight:"1.6", boxShadow:"0 2px 8px rgba(0,0,50,0.1)"
            }}
              dangerouslySetInnerHTML={{__html: msg.content.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br/>")}}
            />
          </div>
        );
      };

      return (
        <div style={{
          fontFamily:"'Segoe UI', system-ui, sans-serif",
          minHeight:"100vh",
          background:"linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 50%, #f5f0ff 100%)",
          display:"flex", flexDirection:"column"
        }}>
          <div style={{background:"linear-gradient(135deg,#0011aa,#0033cc)", padding:"14px 24px", display:"flex", alignItems:"center", gap:"16px", boxShadow:"0 2px 16px rgba(0,0,150,0.3)"}}>
            <div>
              <div style={{color:"#fff", fontSize:"18px", fontWeight:"900", letterSpacing:"-0.5px"}}>
                <span style={{color:"#66aaff"}}>e</span>LGU <span style={{color:"#ffaa33"}}>e</span><span style={{color:"#66ff88"}}>GOV</span><span style={{color:"#ff6666", fontSize:"12px"}}>PH</span>
                <span style={{color:"rgba(255,255,255,0.6)", fontSize:"13px", fontWeight:"400", marginLeft:"10px"}}>AAR Generator</span>
              </div>
              <div style={{color:"rgba(255,255,255,0.6)", fontSize:"11px", marginTop:"1px"}}>AI-Powered Accomplishment Activity Report</div>
            </div>
            <div style={{marginLeft:"auto", display:"flex", gap:"8px"}}>
              {["chat","preview"].map(t => (
                <button key={t} onClick={() => setTab(t)} style={{
                  padding:"7px 16px", borderRadius:"20px", border:"none", cursor:"pointer", fontSize:"12px", fontWeight:"600",
                  background: tab===t ? "#fff" : "rgba(255,255,255,0.15)",
                  color: tab===t ? "#0033cc" : "#fff", transition:"all .2s"
                }}>
                  {t === "chat" ? "💬 Chat" : "📄 Preview Report"}
                </button>
              ))}
              {reportData && tab==="preview" && (
                <>
                  <button onClick={() => fileRef.current?.click()} style={{padding:"7px 16px", borderRadius:"20px", border:"none", cursor:"pointer", fontSize:"12px", fontWeight:"600", background:"rgba(255,255,255,0.15)", color:"#fff"}}>
                    📷 Upload Photos
                  </button>
                  <button onClick={handlePrint} style={{padding:"7px 16px", borderRadius:"20px", border:"none", cursor:"pointer", fontSize:"12px", fontWeight:"600", background:"#ff6600", color:"#fff"}}>
                    Export PDF
                  </button>
                </>
              )}
              <button onClick={() => headerRef.current?.click()} style={{padding:"5px 12px", borderRadius:"20px", border:"none", cursor:"pointer", fontSize:"11px", background:headerImgData?"#4CAF50":"rgba(255,255,255,0.15)", color:"#fff", marginLeft:"8px"}}>
                {headerImgData?"✓ Header":"📄 Header"}
              </button>
              <button onClick={() => footerRef.current?.click()} style={{padding:"5px 12px", borderRadius:"20px", border:"none", cursor:"pointer", fontSize:"11px", background:footerImgData?"#4CAF50":"rgba(255,255,255,0.15)", color:"#fff", marginLeft:"4px"}}>
                {footerImgData?"✓ Footer":"📄 Footer"}
              </button>
            </div>
          </div>
          <input ref={fileRef} type="file" multiple accept="image/*" style={{display:"none"}} onChange={handlePhotos}/>
          <input ref={headerRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleHeaderUpload}/>
          <input ref={footerRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFooterUpload}/>

          <div style={{flex:1, overflow:"auto", padding:"24px", display:"flex", justifyContent:"center"}}>
            {tab === "chat" ? (
              <div style={{width:"100%", maxWidth:"680px", display:"flex", flexDirection:"column", height:"calc(100vh - 140px)"}}>
                <div style={{background:"rgba(0,51,204,0.08)", borderRadius:"12px", padding:"10px 16px", marginBottom:"16px", fontSize:"12px", color:"#0033cc", border:"1px solid rgba(0,51,204,0.15)"}}>
                  💡 Answer each question to build your AAR. The AI will collect all required info and generate your formal report automatically.
                </div>
                <div ref={chatRef} style={{flex:1, overflowY:"auto", paddingRight:"4px"}}>
                  {messages.map(renderMessage)}
                  {loading && (
                    <div style={{display:"flex", marginBottom:"12px"}}>
                      <div style={{width:"32px", height:"32px", borderRadius:"50%", background:"linear-gradient(135deg,#0033cc,#0099ff)", display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontSize:"11px", fontWeight:"bold", flexShrink:0, marginRight:"8px"}}>AI</div>
                      <div style={{background:"#f0f4ff", padding:"12px 16px", borderRadius:"18px 18px 18px 4px", display:"flex", gap:"4px", alignItems:"center"}}>
                        {[0,1,2].map(i => <div key={i} style={{width:"7px", height:"7px", borderRadius:"50%", background:"#0033cc", animation:"bounce 1s infinite", animationDelay:`${i*0.15}s`}}/>)}
                      </div>
                    </div>
                  )}
                </div>
                <div style={{display:"flex", gap:"10px", marginTop:"16px"}}>
                  <input
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => e.key==="Enter" && !e.shiftKey && sendMessage()}
                    placeholder="Type your answer..."
                    style={{flex:1, padding:"12px 18px", borderRadius:"24px", border:"2px solid #c0ccff", outline:"none", fontSize:"14px", background:"#fff", transition:"border .2s"}}
                    onFocus={e => e.target.style.border="2px solid #0033cc"}
                    onBlur={e => e.target.style.border="2px solid #c0ccff"}
                  />
                  <button onClick={sendMessage} disabled={loading} style={{
                    padding:"12px 24px", borderRadius:"24px", border:"none", cursor:"pointer",
                    background: loading ? "#aaa" : "linear-gradient(135deg,#0033cc,#0055ff)",
                    color:"#fff", fontWeight:"700", fontSize:"14px", transition:"all .2s"
                  }}>Send</button>
                </div>
              </div>
            ) : (
              <div style={{width:"100%", maxWidth:"850px"}}>
                {reportData ? (
                  <div style={{background:"#fff", borderRadius:"12px", overflow:"hidden", boxShadow:"0 4px 24px rgba(0,0,100,0.15)"}}>
                    <ReportPreview data={reportData} photos={photos} onUpdate={updateReportData} headerImg={headerImgData} footerImg={footerImgData}/>
                  </div>
                ) : (
                  <div style={{textAlign:"center", padding:"80px 24px", color:"#666"}}>
                    <div style={{fontSize:"48px", marginBottom:"16px"}}>📋</div>
                    <div style={{fontSize:"20px", fontWeight:"600", color:"#333", marginBottom:"8px"}}>No report yet</div>
                    <div>Complete the chat conversation to generate your report.</div>
                    <button onClick={() => setTab("chat")} style={{marginTop:"20px", padding:"10px 24px", borderRadius:"20px", border:"none", background:"#0033cc", color:"#fff", fontWeight:"600", cursor:"pointer"}}>Go to Chat →</button>
                  </div>
                )}
              </div>
            )}
          </div>

          <style>{`
            @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
            * { box-sizing: border-box; }
            ::-webkit-scrollbar { width: 6px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #c0ccff; border-radius: 3px; }
          `}</style>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<AARApp/>);
  </script>
</body>
</html>
